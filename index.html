<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PhotoRestore Web — AI photo restoration in your browser" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:title" content="PhotoRestore Web" />
    <meta
      property="og:description"
      content="AI-powered photo restoration running entirely in your browser"
    />
    <title>PhotoRestore Web</title>
  </head>
  <body>
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
